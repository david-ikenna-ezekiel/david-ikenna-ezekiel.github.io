name: Sync Drive Articles

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-drive-articles:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Drive sync dependencies
        run: python -m pip install --upgrade pip google-api-python-client google-auth beautifulsoup4

      - name: Sync ready Drive articles
        env:
          DRIVE_ARTICLES_FOLDER_URL: ${{ vars.DRIVE_ARTICLES_FOLDER_URL }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python3 scripts/sync-drive-articles.py

      - name: Create article sync PR
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "Sync Drive articles"
          title: "Sync Drive articles"
          body: |
            Automated import of ready Google Docs from the website article Drive folder.

            The sync only publishes docs whose front matter includes `status: ready`.
          branch: codex/drive-article-sync
          delete-branch: true
          add-paths: |
            content/essay-metadata.csv
            content/drive-article-map.json
            essays/*.html
            essays-life.html
            essays-data.html
            essays-business.html
            life-story-timeline.html
