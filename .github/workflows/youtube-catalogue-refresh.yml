name: Refresh YouTube Catalogue

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh-youtube-catalogue:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install yt-dlp
        run: python -m pip install --upgrade pip yt-dlp

      - name: Refresh YouTube metadata and page
        run: |
          python3 scripts/import-youtube-catalogue.py --no-fallback
          python3 scripts/render-youtube-catalogue.py

      - name: Create refresh PR
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "Refresh YouTube catalogue"
          title: "Refresh YouTube catalogue"
          body: |
            Automated weekly refresh of the YouTube catalogue page.

            Updated files:
            - `content/youtube-catalogue.json`
            - `youtube-cv-timeline.html`
          branch: codex/youtube-catalogue-refresh
          delete-branch: true
          add-paths: |
            content/youtube-catalogue.json
            youtube-cv-timeline.html
