name: Refresh YouTube Catalogue

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh-youtube-catalogue:
    runs-on: ubuntu-latest

    steps:
      - name: Decide whether this is the scheduled refresh week
        id: cadence
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "run_refresh=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          week_number="$(date -u +%V)"
          if [ $((10#$week_number % 2)) -eq 0 ]; then
            echo "run_refresh=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_refresh=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out repository
        if: steps.cadence.outputs.run_refresh == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.cadence.outputs.run_refresh == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install yt-dlp
        if: steps.cadence.outputs.run_refresh == 'true'
        run: python -m pip install --upgrade pip yt-dlp

      - name: Refresh YouTube metadata and page
        if: steps.cadence.outputs.run_refresh == 'true'
        run: |
          python3 scripts/import-youtube-catalogue.py --no-fallback
          python3 scripts/render-youtube-catalogue.py

      - name: Create refresh PR
        if: steps.cadence.outputs.run_refresh == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "Refresh YouTube catalogue"
          title: "Refresh YouTube catalogue"
          body: |
            Automated biweekly refresh of the YouTube catalogue page.

            Updated files:
            - `content/youtube-catalogue.json`
            - `youtube-cv-timeline.html`
          branch: codex/youtube-catalogue-refresh
          delete-branch: true
          add-paths: |
            content/youtube-catalogue.json
            youtube-cv-timeline.html
